<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthBot - AI Healthcare Assistant</title>
    <link rel="icon" href="healthcare chatbot main.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dark-theme.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="header">
                <img src="healthcare chatbot main.png" alt="HealthBot Logo" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 15px; object-fit: cover; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
                <h1>HealthBot</h1>
                <p>Your AI Healthcare Assistant</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn-primary">Login</button>
                
                <div class="form-footer">
                    <p>Don't have an account? <a href="register.html">Register here</a></p>
                </div>
            </form>
            
            <div class="theme-toggle">
                <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
            </div>
        </div>
    </div>
    
    <script src="auth.js"></script>
    <script src="theme.js"></script>
</body>
</html>
