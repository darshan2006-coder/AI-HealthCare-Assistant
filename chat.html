<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Chat - HealthBot</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dark-theme.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <h2>HealthBot</h2>
        </div>
        <div class="nav-menu">
            <a href="home.html" class="nav-link">Home</a>
            <a href="chat.html" class="nav-link active">New Chat</a>
            <a href="history.html" class="nav-link">Chat History</a>
            <a href="about.html" class="nav-link">About</a>
            <button id="themeToggle" class="theme-btn">🌙</button>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="container dashboard" style="margin-top: 30px;">
        <div class="dashboard-cards" style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px; align-items: start;">
            
            <div class="card basic-form-card" style="text-align: left;">
                <h3>Consultation Details</h3>
                <form id="symptomForm" class="auth-form" style="margin-top: 15px;">
                    <div class="form-group">
                        <label for="symptomsText">Symptoms:</label>
                        <input type="text" id="symptomsText" placeholder="e.g., Fever, Headache" required>
                        <small style="color: #666; font-size: 12px;">Separate multiple with commas</small>
                    </div>
                    <div class="form-group">
                        <label for="duration">Duration:</label>
                        <input type="text" id="duration" placeholder="e.g., 3 days" required>
                    </div>
                    <div class="form-group">
                        <label for="severity">Severity:</label>
                        <select id="severity" required style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc;">
                            <option value="Mild">Mild</option>
                            <option value="Moderate">Moderate</option>
                            <option value="Severe">Severe</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="temperature">Temperature (°C/°F):</label>
                        <input type="text" id="temperature" placeholder="e.g., 38°C or Normal" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;" id="sendBtn">Analyze Symptoms</button>
                </form>
            </div>

            <div class="card chat-container" style="height: 600px; display: flex; flex-direction: column; padding: 0;">
                <div class="chat-header" style="padding: 15px; border-bottom: 1px solid #eee; background-color: #f8f9fa;">
                              <h2 style="margin: 0; font-size: 18px;">AI Healthcare Assistant</h2>
                     <div class="chat-actions">
                            <small style="color: #666; margin-right: 15px;" id="chatStatus">Ready</small>
        
                           <button id="newChatHeaderBtn" class="btn-secondary" style="padding: 5px 10px; font-size: 12px; margin-right: 8px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">New Chat</button>
        
                          <button id="saveChatBtn" class="btn-primary" style="padding: 5px 10px; font-size: 12px;">Save Chat</button>
                          <button id="downloadPdfBtn" class="btn-primary" style="padding: 5px 10px; font-size: 12px; background-color: #28a745; border: none;">📄 Export PDF</button>
                     </div>
                 </div>

                <div class="chat-messages" id="chatMessages" style="flex-grow: 1; padding: 15px; overflow-y: auto;">
                    <div class="message bot-message" style="background-color: #e9ecef; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
                        <strong>🤖 HealthBot:</strong>
                        <p style="margin: 5px 0 0 0;">Hello! I'm your AI healthcare assistant. Please fill out your symptoms on the left to begin.</p>
                        <small class="message-time"></small>
                    </div>
                </div>
                <div class="chat-input-container" style="padding: 15px; border-top: 1px solid #eee; background-color: #fff; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px;">
                       <div class="input-group" style="display: flex; gap: 10px;">
                            <input type="text" id="messageInput" placeholder="Type your health question here..." maxlength="500" style="flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;">
                             <button id="chatSendBtn" class="send-btn" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Send</button>
                        </div>
                </div>
            </div>

        </div>
    </div>

    <div id="warningModal" class="warning-modal">
        <div class="warning-content">
            <h3 id="warningTitle">⚠ Warning</h3>
            <p id="warningText"></p>
            <button id="warningOkBtn">OK</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="auth.js"></script>
    <script src="theme.js"></script>
    <script src="storage.js"></script>
    <script type="module" src="js/chat.js"></script>
</body>
</html>
